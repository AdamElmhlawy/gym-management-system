{% extends "admin_panel/admin_base.html" %}

{% block admin_content %}

<section class="admin-hero">
    <div class="hero-badge">Admin Dashboard</div>
    <h1 class="admin-title">System overview</h1>
</section>

<div class="admin-stats">
    <div class="stat-item">
        <div class="stat-number">${{ total_income }}</div>
        <div class="stat-label">Total Income</div>
    </div>

    <div class="stat-item">
        <div class="stat-number">${{ total_salaries }}</div>
        <div class="stat-label">Trainer Salaries</div>
    </div>

    <div class="stat-item">
        <div class="stat-number">{{ total_users }}</div>
        <div class="stat-label">Users</div>
    </div>
</div>

{% endblock %}
